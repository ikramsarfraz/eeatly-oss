name: CI

on:
  pull_request:
    branches: [develop, main]
  push:
    branches: [develop, main]

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          # Pinned to repo `packageManager` (package.json) so the workflow
          # runs the same pnpm Vercel + local development use.
          version: 10.33.2

      - uses: actions/setup-node@v4
        with:
          # Matches `engines.node` in package.json (`24.14.x`) — we lock
          # to a concrete patch the way the .nvmrc does locally.
          node-version: 24.14.1
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - run: pnpm typecheck
      - run: pnpm lint
      - run: pnpm test
      - run: pnpm build
